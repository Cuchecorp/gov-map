name: lobby-camara-weekly

# Ingesta SEMANAL de AUDIENCIAS de lobby de la CÁMARA (listado de audiencias del portal de
# transparencia) contra PROD. Escribe lobby_audiencia con estado_vinculo='confirmado' para los
# sujetos que el match determinista reconcilia.
#
# WAF anti-bot: www.camara.cl bloquea el fetch nativo de Node (undici / TLS fingerprint) → el
# crudo se descarga con curl (UA identificatorio Bot-Ciudadano/1.0) a /tmp/lobby.html y el CLI
# lo lee con --html-file (bypass del WAF). Mismo transporte que agenda-weekly usa para Cámara.
# El rate-limit lo aplica el conector (@obs/ingest, orden LOCKED). Secrets vía ${{ secrets.* }}.
#
# Schedule: martes 11:00 UTC (~07:00 CL) — distinto de agenda(lun)/leyes(vie). También manual.

# WAF de camara.cl bloquea IPs de GH Actions desde al menos 2026-06-30 (G7 audit Phase 56).
# curl devuelve <10KB (WAF intercept) → el paso de descarga falla antes del CLI.
# Schedule DESHABILITADO: usar dispatch manual solo cuando el operador confirme que el WAF
# permite GH Actions. Fallback local: docs/runbooks/cron-local-fallback.md
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lobby-camara-weekly
  cancel-in-progress: false

jobs:
  lobby-camara:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install deps
        # --ignore-scripts: tsx trae su propio esbuild; evita ERR_PNPM_IGNORED_BUILDS (gate pnpm 11).
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Descargar crudo Cámara (curl anti-WAF)
        # Node fetch (undici) es bloqueado por el WAF de camara.cl; curl con UA identificatorio
        # entrega el crudo. El CLI lo lee con --html-file. Gate <10KB = respuesta WAF/error.
        run: |
          curl -sS -A 'Bot-Ciudadano/1.0' -o /tmp/lobby.html \
            'https://www.camara.cl/transparencia/listadodeaudiencias.aspx'
          SIZE=$(stat -c%s /tmp/lobby.html)
          echo "lobby.html = $SIZE bytes"
          if [ "$SIZE" -lt 10240 ]; then echo "WAF/respuesta < 10KB"; exit 1; fi

      - name: Run lobby Cámara
        env:
          SUPABASE_API_URL: ${{ secrets.SUPABASE_API_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          OUT=$(pnpm --filter @obs/lobby exec tsx src/run-camara-lobby-cli.ts --html-file /tmp/lobby.html)
          echo "$OUT"
          echo "$OUT" | grep -qE 'audiencias=[1-9][0-9]*' || { echo "audiencias=0"; exit 1; }
