name: backup-parlamentario

# Cadencia de respaldo del snapshot autoritativo de la maestra `parlamentario` (ID-09).
#
# El snapshot `supabase/seeds/parlamentario.seed.json` versionado en git ES el respaldo
# fuera de Supabase (autoritativo HOY, no depende del free tier ni de R2). Este workflow lo
# REGENERA periódicamente desde los catálogos oficiales (Senado XML + Cámara XML) reusando el
# MISMO seeder de @obs/identity (mismo rate-limit 2-3s + UA identificado), y commitea el diff.
#
# Compuerta humana preservada: corre con `--preserve-estado` y SIN `--promote` → mergea el
# `estado` ya confirmado por revisión humana del snapshot committeado por `id`. Una re-siembra
# automática NUNCA revierte `confirmado` → `no_confirmado` en silencio (ID-01).
#
# R2 (ID-09 cadencia, segundo destino): GATEADO por la presencia de credencial R2 válida. Hoy
# las credenciales S3 dan 401 (03-CONTEXT) → el paso se OMITE. Cuando exista una credencial
# válida en repo secrets, el `if` lo habilita (cierra también el checkpoint R2 de Fase 1).

on:
  schedule:
    # Semanal: lunes 06:00 UTC. Cadencia de respaldo periódico (ID-09).
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write # para commitear el snapshot regenerado

concurrency:
  group: backup-parlamentario
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Regenerar snapshot (seeder LIVE, preservando estado humano)
        # SIN service key local en CI → la carga a DB se omite; el snapshot git es autoritativo.
        # --preserve-estado: mantiene `confirmado` del snapshot committeado (no revierte ID-01).
        # NO se pasa --promote: la promoción es revisión humana, jamás automática.
        run: pnpm --filter @obs/identity run seed:live -- --preserve-estado

      - name: Commitear el snapshot si cambió
        run: |
          if [[ -n "$(git status --porcelain supabase/seeds/parlamentario.seed.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add supabase/seeds/parlamentario.seed.json
            git commit -m "chore(backup): refrescar snapshot parlamentario (ID-09 cadencia)"
            git push
          else
            echo "Sin cambios en el snapshot — nada que commitear."
          fi

      - name: Respaldo a R2 (GATEADO por credencial; hoy 401 → omitido)
        # Solo corre si HAY credencial R2 en repo secrets. Mientras la credencial S3 dé 401
        # (03-CONTEXT) este step queda inerte. Cuando exista una válida, sube el snapshot a R2
        # vía el R2Store de Fase 1 (segundo destino de ID-09 + cierra el checkpoint R2 de Fase 1).
        if: ${{ secrets.R2_ACCESS_KEY_ID != '' && secrets.R2_SECRET_ACCESS_KEY != '' && secrets.R2_BUCKET != '' }}
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: pnpm --filter @obs/identity run seed:live -- --preserve-estado --r2
