name: leyes-weekly

# Ingesta DIARIA incremental de PROYECTOS DE LEY (tramitación + votaciones + votos + timeline)
# contra PROD. Cadencia L-V 20:00 UTC (~16:00 CL, cierre de jornada parlamentaria):
# captura votos del mismo día laboral + cambios de etapa + proyectos nuevos.
#
# La máquina round-robin (Phase 74) rota una ventana del corpus con offset persistido en
# leyes_rotacion_estado → cada corrida diaria cubre agenda fresca + rebanada nueva del corpus;
# el corpus completo rota más rápido que con una sola corrida semanal. Sin cambio de CLI.
#
# Refresca el conjunto de boletines que la plataforma YA referencia (proyecto + agenda de
# comisiones + tabla de sala) — ver run-tramitacion-prod-cli. Idempotente (upsert por clave
# natural). Mismo orden LOCKED de @obs/ingest (allowlist→robots→rate-limit 2-3s→fetch). Fuentes:
# opendata.camara.cl (WS abierto) + web-back/tramitacion del Senado (XML) — sin WAF, fetch nativo.
# Repo público Cuchecorp/gov-map = minutos GH Actions ilimitados → cadencia diaria autorizada.

on:
  schedule:
    - cron: "0 20 * * 1-5" # lunes a viernes 20:00 UTC (repo público, minutos ilimitados)
  workflow_dispatch:
    inputs:
      limite:
        description: "Máx. boletines a refrescar (default 80)"
        required: false
        default: ""
      boletines:
        description: "Lista explícita YYYY-NN,… (opcional; override del set de la DB)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: leyes-weekly
  cancel-in-progress: false

jobs:
  leyes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install deps
        # --ignore-scripts: tsx trae su propio esbuild; evita ERR_PNPM_IGNORED_BUILDS (gate pnpm 11).
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run leyes weekly ingest (mismo código del CLI)
        env:
          SUPABASE_API_URL: ${{ secrets.SUPABASE_API_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          # R2 creds (Etapa 1, crudo content-addressed + source_snapshot / CRON-02).
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          # Inputs por ENV (no interpolados en el shell) — evita inyección de comandos en un
          # step que lleva SUPABASE_SECRET_KEY.
          LIMITE: ${{ github.event.inputs.limite }}
          BOLETINES: ${{ github.event.inputs.boletines }}
        run: |
          ARGS=""
          if [ -n "$LIMITE" ]; then ARGS="$ARGS --limite $LIMITE"; fi
          if [ -n "$BOLETINES" ]; then ARGS="$ARGS --boletines $BOLETINES"; fi
          pnpm --filter @obs/tramitacion exec tsx src/run-tramitacion-prod-cli.ts $ARGS
