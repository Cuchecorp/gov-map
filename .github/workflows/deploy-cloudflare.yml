name: deploy-cloudflare

# Deploy del frontend Next.js 16 a Cloudflare Workers vía @opennextjs/cloudflare.
# Corre en Linux (ubuntu) a propósito: el build de OpenNext usa symlinks que
# Windows bloquea sin Developer Mode (EPERM) — CI evita ese problema y da deploys
# reproducibles. Disparo MANUAL (workflow_dispatch), deliberado, igual que los
# otros workflows del repo.
#
# SECRETS de repo requeridos (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   - token con permiso "Edit Cloudflare Workers"
#   CLOUDFLARE_ACCOUNT_ID  - id de la cuenta (el del endpoint, 10fb709d...)
#
# Los SECRETS de RUNTIME del Worker (SUPABASE_URL, SUPABASE_SECRET_KEY,
# GEMINI_API_KEY, CRUCES_PUBLIC_ENABLED) NO se setean aquí: van una vez con
# `wrangler secret put` (ver docs/deploy-cloudflare.md). El build NO los necesita
# (rutas dinámicas). NOTA post-legacy (Camino A): el sitio lee con la SERVICE key
# (sb_secret_…, service_role) — ya NO usa SUPABASE_ANON_KEY ni el legacy JWT.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Etiqueta informativa del deploy (no cambia el target)"
        required: false
        default: "production"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        # --ignore-scripts evita ERR_PNPM_IGNORED_BUILDS (gate pnpm 11); los binarios que el
        # build de OpenNext sí necesita se reconstruyen on-demand en el paso siguiente.
        run: pnpm install --frozen-lockfile --ignore-scripts

      # El build de OpenNext necesita esbuild/workerd (y sharp para imágenes) → se reconstruyen
      # explícitamente tras el install con --ignore-scripts.
      - name: Allow native build scripts (esbuild/workerd/sharp)
        run: pnpm rebuild esbuild workerd sharp || true

      - name: Build + Deploy (OpenNext → Cloudflare Workers)
        working-directory: app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm run deploy
