version: 2
updates:
  # Mantiene los SHA de GitHub Actions actualizados automáticamente (WR-02).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"

  # npm/pnpm (app)
  - package-ecosystem: "npm"
    directory: "/app"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
