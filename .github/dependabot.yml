version: 2
updates:
  # Mantiene los SHA de GitHub Actions actualizados automáticamente (WR-02).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"

  # npm/pnpm — directory raíz del workspace (el pnpm-lock.yaml vive en /, no en /app;
  # con /app dependabot bumpea package.json sin poder actualizar el lockfile → CI rojo)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
