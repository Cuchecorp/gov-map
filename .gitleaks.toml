# .gitleaks.toml — allowlist quirúrgico para falsos positivos conocidos en el historial git.
# Regenerar scan: gitleaks git --redact --config .gitleaks.toml
# Expected: 0 findings tras el allowlist.
# Triage 2026-07-23: todos los findings son FP (fixtures de test y documentación).
#
# Estrategia: allowlist POR VALOR (regexes) en lugar de por path completo (WR-03).
# Ventaja: gitleaks sigue escaneando esos archivos — solo silencia los tokens FP específicos.
# Un secreto REAL con forma diferente en los mismos archivos todavía sería detectado.
#
# FP 1: constantes S3CR3T-TICKET-* usadas como fixture de secreto en los tests de @obs/dinero
#        y citadas como ejemplos de código en los docs de planificación de la fase 96.
#        No son secretos reales: contienen el prefijo "S3CR3T" (obfuscado intencionalmente)
#        y valores hex cortos no-secret (NO-LEAK-9f2a, NO-LEAK-70, MASIVO-70).
# FP 2: __VIEWSTATE token en packages/agenda/test/fixtures/camara-citaciones-semana.html
#        Es el token ASP.NET WebForms de la página de citaciones de Cámara, capturado como
#        fixture de test. No es un secreto propio — es un token de sesión de un servidor externo
#        (gobierno de Chile) sin valor de autenticación propio una vez expirado.

title = "Observatorio gitleaks config"

[allowlist]
description = "FP triage 2026-07-23: constantes de test fixture (por valor, no por path)"
regexes = [
  # FP 1: fixtures S3CR3T-TICKET-* en tests @obs/dinero y docs fase 96
  # Matchea exactamente los 3 valores conocidos; un ticket real tendría formato distinto.
  '''S3CR3T-TICKET-(?:NO-LEAK-9f2a|NO-LEAK-70|MASIVO-70)''',
  # FP 2: __VIEWSTATE de camara.cl en el fixture HTML de scraping WebForms
  # El __VIEWSTATE es base64 que empieza con "WVUpe+" — token de sesión externo expirado.
  # Se usa el prefijo único del valor para no silenciar otros base64 en el mismo archivo.
  '''WVUpe\+ogzS8t9\+hVNzDT''',
]
