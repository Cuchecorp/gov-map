packages:
  - "app"
  - "packages/*"

# No verificar/instalar dependencias automaticamente al correr scripts: evita que
# el gate de build-scripts ignorados aborte `pnpm -w typecheck`/`test`.
verifyDepsBeforeRun: false

# Build scripts nativos no requeridos para typecheck/test en este monorepo.
ignoredBuiltDependencies:
  - esbuild
  - sharp
  - unrs-resolver

minimumReleaseAgeExclude:
  - openai@6.44.0

allowBuilds:
  '@google/genai': set this to true or false
  esbuild: set this to true or false
  protobufjs: set this to true or false
  workerd: set this to true or false
