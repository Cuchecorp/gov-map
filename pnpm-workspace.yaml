packages:
  - "app"
  - "packages/*"

# No verificar/instalar dependencias automaticamente al correr scripts: evita que
# el gate de build-scripts ignorados aborte `pnpm -w typecheck`/`test`.
verifyDepsBeforeRun: false

# Build scripts: se APRUEBAN explícitamente (equivalente a `pnpm approve-builds`). En pnpm 11
# `ignoredBuiltDependencies` NO suprime el gate ERR_PNPM_IGNORED_BUILDS (que aborta
# `pnpm install --frozen-lockfile` en CI); hay que listar los deps con build-script en
# `onlyBuiltDependencies` para que NINGUNO quede "ignorado" → el gate no se dispara. Todos
# publican binarios prebuilt, así que el build en CI es trivial.
onlyBuiltDependencies:
  - "@google/genai"
  - esbuild
  - protobufjs
  - sharp
  - unrs-resolver
  - workerd

# Excepcion al gate de "edad minima de release" para fijar openai@6.44.0.
# Anadido 2026-06-17 con el scaffold de @obs/llm. NOTA: hoy es INERTE — no existe un
# `minimumReleaseAge` base en el repo (sin .npmrc ni setting aqui), asi que no hay gate
# que excluir. Revisar al subir openai: si se adopta `minimumReleaseAge`, actualizar o
# quitar esta linea; si no, es candidata a borrarse.
minimumReleaseAgeExclude:
  - openai@6.44.0
